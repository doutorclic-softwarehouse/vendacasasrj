<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venda Casas RJ</title>

<style>
:root {
    /* Cores do seu design original */
    --cor-fundo-site: #f7f9fc;
    --roxo-titulos: #6a2cff;
    
    /* Cores para o Glow Laranja */
    --laranja-glow-forte: #ff6a00;
    --laranja-glow-suave: #ff8c3a;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    /* Fundo original */
    background: linear-gradient(135deg, #f5f6fb, #ffffff);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px; /* Margem de segurança para mobile */
}

/* CONTAINER PRINCIPAL BRANCO */
.container {
    position: relative;
    background: #fff; /* Fundo do frame é BRANCO */
    padding: 30px 25px;
    border-radius: 20px;
    width: 100%;
    max-width: 400px; /* Largura máxima do frame */
    text-align: center;
    z-index: 1;
    /* Garante que nada saia do container */
    overflow: hidden; 
    box-sizing: border-box;
}

/* BORDA NEON - APENAS LARANJA */
.container::before {
    content: "";
    position: absolute;
    inset: -2px; /* Espessura da borda */
    border-radius: 22px;
    /* Gradiente apenas laranja */
    background: linear-gradient(45deg, var(--laranja-glow-forte), var(--laranja-glow-suave), var(--laranja-glow-forte));
    z-index: -1;
}

/* GLOW (BRILHO) - APENAS LARANJA */
.container::after {
    content: "";
    position: absolute;
    inset: -8px; /* Espalhamento do brilho */
    border-radius: 24px;
    /* Gradiente apenas laranja com desfoque */
    background: linear-gradient(45deg, var(--laranja-glow-forte), var(--laranja-glow-suave), var(--laranja-glow-forte));
    filter: blur(15px); /* Efeito de desfoque */
    z-index: -2;
    opacity: 0.8; /* Intensidade do brilho */
}

/* LOGO */
.logo {
    max-width: 160px;
    margin: 0 auto 15px;
    display: block;
    mix-blend-mode: multiply;
}

/* TEXTOS ORIGINAIS */
.title {
    font-size: 22px;
    font-weight: 800;
    color: var(--roxo-titulos); /* Título Roxo */
    margin-top: 0;
}

.sub {
    font-size: 13px;
    color: #666;
    margin-bottom: 10px;
}

.urgencia {
    font-size: 12px;
    color: var(--laranja-glow-forte); /* Destaque Laranja */
    font-weight: bold;
    margin-bottom: 20px;
}

/* CAMPOS DO FORMULÁRIO (CORREÇÃO DE VAZAMENTO) */
.field-group {
    text-align: left;
    margin-bottom: 15px;
    display: none; /* Escondido por padrão para o funil */
}

/* Mostra o campo com animação */
.field-group.show {
    display: block;
    animation: fadeIn 0.4s forwards;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

label {
    font-size: 11px;
    font-weight: bold;
    color: #555;
    display: block;
    margin-bottom: 5px;
}

/* CSS CRUCIAL PARA NÃO VAZAR */
select, input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #ddd;
    background-color: #fff;
    font-size: 14px;
    /* ISSO IMPEDE QUE O CAMPO ULTRAPASSE A BORDA */
    box-sizing: border-box; 
    display: block;
}

/* BOTÃO CTA ORIGINAL (Laranja/Roxo) */
button {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 50px;
    /* Gradiente original: Laranja para Roxo */
    background: linear-gradient(45deg, #ff6a00, var(--roxo-titulos));
    color: white;
    font-weight: 800;
    font-size: 16px;
    cursor: pointer;
    margin-top: 15px;
    position: relative;
    z-index: 1;
    transition: transform 0.2s;
}

button:active {
    transform: scale(0.98);
}

button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

/* WHATSAPP FLOAT ORIGINAL */
.whatsapp-float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(45deg, #25d366, #128c7e);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    text-decoration: none;
    z-index: 999;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.footer-text {
    font-size: 10px;
    color: #999;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

    <img src="https://i.ibb.co/HDWMYfkJ/venda-logo.jpg" class="logo">

    <div class="title">Encontre seu imóvel ideal</div>
    <div class="sub">Filtramos as melhores opções pra você</div>
    <div class="urgencia">🔥 Temos imóveis com desconto HOJE</div>

    <form id="formLead">

        <div class="field-group show">
            <label>Seu nome</label>
            <input type="text" id="nome" placeholder="Nome Completo">
        </div>

        <div class="field-group show">
            <label>Seu telefone</label>
            <input type="tel" id="telefone" placeholder="(22) 99999-9999">
        </div>

        <div class="field-group show">
            <label>O que você busca?</label>
            <select id="tipo_servico" onchange="atualizarFunil()">
                <option value="">Escolha...</option>
                <option value="comprar">Comprar</option>
                <option value="alugar_fixo">Alugar</option>
                <option value="temporada">Temporada</option>
            </select>
        </div>

        <div id="f_urgencia" class="field-group">
            <label>Quando pretende fechar?</label>
            <select id="urgencia">
                <option value="">Selecione</option>
                <option>Imediato</option>
                <option>Até 30 dias</option>
                <option>Até 3 meses</option>
                <option>Só pesquisando</option>
            </select>
        </div>

        <div id="f_quartos" class="field-group">
            <label>Quartos</label>
            <select id="quartos">
                <option value="">Selecione</option>
                <option>1</option>
                <option>2</option>
                <option>3+</option>
            </select>
        </div>

        <div id="f_credito" class="field-group">
            <label>Crédito aprovado?</label>
            <select id="credito">
                <option value="">Selecione</option>
                <option>Sim</option>
                <option>Em análise</option>
                <option>Não</option>
            </select>
        </div>

        <button id="btnEnviar" type="button" onclick="enviarZap()" disabled>
            Ver imóveis disponíveis
        </button>

    </form>

    <div class="footer-text">Venda Casas RJ</div>

</div>

<a href="https://wa.me/5522992414173?text=Olá!%20Vim%20pelo%20site" 
   class="whatsapp-float" 
   target="_blank">
   💬
</a>

<script>
// Lógica do Funil Original
function atualizarFunil() {
    const tipo = document.getElementById('tipo_servico').value;

    // Habilita o botão ao selecionar o primeiro campo do funil
    if (tipo !== "") {
        document.getElementById('btnEnviar').disabled = false;
        
        // Mostra campos comuns
        document.getElementById('f_urgencia').classList.add('show');
        document.getElementById('f_quartos').classList.add('show');

        // Mostra campo crédito apenas se for comprar
        if (tipo === "comprar") {
            document.getElementById('f_credito').classList.add('show');
        } else {
            document.getElementById('f_credito').classList.remove('show');
        }
    } else {
        // Esconde tudo se resetar o tipo
        document.getElementById('btnEnviar').disabled = true;
        document.getElementById('f_urgencia').classList.remove('show');
        document.getElementById('f_quartos').classList.remove('show');
        document.getElementById('f_credito').classList.remove('show');
    }
}

// Envio para WhatsApp Original
function enviarZap() {
    const nome = document.getElementById('nome').value;
    const tel = document.getElementById('telefone').value;
    const tipo = document.getElementById('tipo_servico').value;
    const urgencia = document.getElementById('urgencia').value;
    const quartos = document.getElementById('quartos').value;
    
    // Validação básica
    if (!nome || !tel || !tipo || !urgencia || !quartos) {
        alert("Por favor, preencha todos os campos visíveis.");
        return;
