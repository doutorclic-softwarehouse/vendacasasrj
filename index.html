<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venda Casas RJ</title>

<style>
:root {
    --laranja: #ff6a00;
    --roxo: #6a2cff;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f0f2f5; /* Fundo cinza claro para destacar o card */
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

/* CONTAINER PRINCIPAL */
.container {
    position: relative;
    background-color: #ffffff !important; /* FORÇA O FUNDO BRANCO */
    padding: 30px 25px;
    border-radius: 20px;
    width: 100%;
    max-width: 400px;
    text-align: center;
    z-index: 1; /* Garante que o card fique na frente */
    box-sizing: border-box;
}

/* A BORDA NEON (LINHA FINA) */
.container::before {
    content: "";
    position: absolute;
    inset: -2px; /* Espessura da borda */
    border-radius: 22px;
    background: linear-gradient(45deg, var(--laranja), #ffae00, var(--laranja));
    z-index: -1; /* Fica logo atrás do branco */
}

/* O GLOW (O BRILHO AO REDOR) */
.container::after {
    content: "";
    position: absolute;
    inset: -6px; /* O quanto o brilho se expande */
    border-radius: 25px;
    background: var(--laranja);
    filter: blur(15px); /* Efeito de desfoque para parecer neon */
    z-index: -2; /* Fica atrás da borda */
    opacity: 0.6;
}

/* LOGO */
.logo {
    max-width: 160px;
    margin: 0 auto 15px;
    display: block;
}

/* TEXTOS */
.title {
    font-size: 22px;
    font-weight: 800;
    color: var(--roxo);
    margin: 0;
}

.sub {
    font-size: 13px;
    color: #666;
    margin-bottom: 10px;
}

.urgencia {
    font-size: 12px;
    color: var(--laranja);
    font-weight: bold;
    margin-bottom: 20px;
}

/* CAMPOS DO FORMULÁRIO */
.field-group {
    text-align: left;
    margin-bottom: 15px;
    display: none;
    opacity: 0;
}

.field-group.show {
    display: block;
    animation: fadeIn 0.4s forwards;
}

@keyframes fadeIn {
    to { opacity: 1; }
}

label {
    font-size: 11px;
    font-weight: bold;
    color: #555;
    display: block;
    margin-bottom: 5px;
}

select, input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #ddd;
    box-sizing: border-box; /* Isso impede que o campo saia do frame */
    background: #fff;
    font-size: 14px;
}

/* BOTÃO CTA */
button {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(45deg, var(--laranja), var(--roxo));
    color: white;
    font-weight: 800;
    cursor: pointer;
    margin-top: 15px;
    transition: transform 0.2s;
}

button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

/* WHATSAPP */
.whatsapp-float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #25d366;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    text-decoration: none;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    z-index: 999;
}

.footer-text {
    font-size: 10px;
    color: #999;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">
    <img src="https://i.ibb.co/HDWMYfkJ/venda-logo.jpg" class="logo">

    <div class="title">Encontre seu imóvel ideal</div>
    <div class="sub">Filtramos as melhores opções pra você</div>
    <div class="urgencia">🔥 Temos imóveis com desconto HOJE</div>

    <form>
        <div class="field-group show">
            <label>Seu nome</label>
            <input type="text" id="nome">
        </div>

        <div class="field-group show">
            <label>Seu telefone</label>
            <input type="tel" id="telefone">
        </div>

        <div class="field-group show">
            <label>O que você busca?</label>
            <select id="tipo_servico" onchange="atualizarFunil()">
                <option value="">Escolha...</option>
                <option value="comprar">Comprar</option>
                <option value="alugar_fixo">Alugar</option>
                <option value="temporada">Temporada</option>
            </select>
        </div>

        <div id="f_urgencia" class="field-group">
            <label>Quando pretende fechar?</label>
            <select id="urgencia">
                <option value="">Selecione</option>
                <option>Imediato</option>
                <option>Até 30 dias</option>
                <option>Até 3 meses</option>
                <option>Só pesquisando</option>
            </select>
        </div>

        <div id="f_quartos" class="field-group">
            <label>Quartos</label>
            <select id="quartos">
                <option value="">Selecione</option>
                <option>1</option>
                <option>2</option>
                <option>3+</option>
            </select>
        </div>

        <div id="f_piscina" class="field-group">
            <label>Piscina?</label>
            <select id="piscina">
                <option value="">Selecione</option>
                <option>Sim</option>
                <option>Não</option>
            </select>
        </div>

        <div id="f_credito" class="field-group">
            <label>Crédito aprovado?</label>
            <select id="credito">
                <option value="">Selecione</option>
                <option>Sim</option>
                <option>Em análise</option>
                <option>Não</option>
            </select>
        </div>

        <button id="btnEnviar" type="button" onclick="enviarZap()" disabled>
            Ver imóveis disponíveis
        </button>
    </form>

    <div class="footer-text">Venda Casas RJ</div>
</div>

<a href="https://wa.me/5522992414173?text=Olá!%20Vim%20pelo%20site" class="whatsapp-float" target="_blank">
   💬
</a>

<script>
function atualizarFunil() {
    const tipo = document.getElementById('tipo_servico').value;
    if (tipo === "") return;

    document.getElementById('btnEnviar').disabled = false;
    document.getElementById('f_urgencia').classList.add('show');
    document.getElementById('f_quartos').classList.add('show');
    document.getElementById('f_piscina').classList.add('show');

    if (tipo === "comprar") {
        document.getElementById('f_credito').classList.add('show');
    } else {
        document.getElementById('f_credito').classList.remove('show');
    }
}

function enviarZap() {
    const nome = document.getElementById('nome').value;
    const tel = document.getElementById('telefone').value;
    const urgencia = document.getElementById('urgencia').value;
    const tipo = document.getElementById('tipo_servico').value;
    const quartos = document.getElementById('quartos').value;
    const piscina = document.getElementById('piscina').value;

    if (!nome || !tel || !urgencia || !tipo || !quartos || !piscina) {
        alert("Preencha tudo corretamente");
        return;
    }

    if (urgencia === "Só pesquisando") {
        alert("Estamos atendendo clientes prontos pra fechar 😉");
        return;
    }

    const msg = `📊 LEAD QUALIFICADO\n\nNome: ${nome}\nTelefone: ${tel}\nPrazo: ${urgencia}\nTipo: ${tipo}\nQuartos: ${quartos}\nPiscina: ${piscina}`;
    window.open(`https://wa.me/5522992414173?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
