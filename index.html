<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venda Casas RJ</title>

<meta property="og:title" content="🏡 Encontre seu imóvel ideal no RJ">
<meta property="og:description" content="Casas, terrenos e lojas com as melhores oportunidades. Clique e veja agora.">
<meta property="og:image" content="https://i.ibb.co/HDWMYfkJ/venda-logo.jpg">
<meta property="og:url" content="https://SEU-LINK-AQUI">
<meta property="og:type" content="website">

<style>
:root {
    --bg-body:#f4f7f6;
    --primaria:#ff6a00;
    --secundaria:#6a2cff;
}

body{
    margin:0;
    font-family:sans-serif;
    background:var(--bg-body);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    position:relative;
    background:#fff;
    border-radius:20px;
    width:100%;
    max-width:420px;
    padding:25px;
    text-align:center;
    overflow-y:auto;
}

/* MOBILE FULL SCREEN (9:16) */
@media (max-width: 768px){

    body{
        padding:0;
        margin:0;
    }

    .container{
        width:100%;
        height:100vh;
        max-width:100%;
        border-radius:0;
        padding:20px;

        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center; /* 👈 ISSO resolve o alinhamento */
    }

    form{
        width:100%;
    }
}

.container::before{
    content:"";
    position:absolute;
    inset:-2px; /* ESSENCIAL pra criar a borda */
    border-radius:22px;
    background:linear-gradient(45deg,var(--primaria),var(--secundaria));
    z-index:-1;
}

.logo{
    max-width:150px;
    margin-bottom:15px;
}

.field-group{
    display:none;
    margin-bottom:15px;
    text-align:left;
}

.field-group.show{
    display:block;
}

label{
    font-size:12px;
    font-weight:bold;
}

input,select{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #eee;
    margin-top:5px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:50px;
    background:linear-gradient(45deg,var(--primaria),var(--secundaria));
    color:#fff;
    font-weight:bold;
    margin-top:15px;
}



.whatsapp-float{
    position:fixed;
    bottom:20px;
    right:20px;
    width:60px;
    height:60px;
    background:#25d366;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:28px;
    text-decoration:none;
    z-index:999;
    animation:pulse 1.8s infinite;
}

@keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(37,211,102,0.6);}
    70%{box-shadow:0 0 0 12px rgba(37,211,102,0);}
    100%{box-shadow:0 0 0 0 rgba(37,211,102,0);}
}
</style>
</head>

<body>
  
<div class="container">

<img src="https://i.ibb.co/HDWMYfkJ/venda-logo.jpg" class="logo">

<form id="formLead">

<div class="field-group show">
<label>Seu nome</label>
<input id="nome" oninput="validarForm()">
</div>

<div class="field-group show">
<label>O que você busca?</label>
<select id="tipo_servico" onchange="atualizarFunil()">
<option value="">Selecione</option>
<option value="Comprar">Comprar</option>
<option value="Alugar Fixo">Alugar Fixo</option>
<option value="Temporada">Temporada</option>
</select>
</div>

<div id="f_tipo_imovel" class="field-group">
<label>Tipo de imóvel</label>
<select id="tipo_imovel" onchange="handleImovel(); validarForm()">
<option value="">Selecione</option>
<option value="Casa">Casa</option>
<option value="Loja">Loja</option>
<option value="Terreno">Terreno</option>
</select>
</div>

<div id="f_quartos" class="field-group">
<label>Quartos</label>
<select id="quartos" onchange="validarForm()">
<option value="">Selecione</option>
<option>1</option>
<option>2</option>
<option>3+</option>
</select>
</div>

<div id="f_piscina" class="field-group">
<label>Piscina</label>
<select id="piscina" onchange="validarForm()">
<option value="">Selecione</option>
<option>Com piscina</option>
<option>Sem piscina</option>
</select>
</div>

<div id="f_valor_compra" class="field-group">
<label>Valor</label>
<select id="valor_compra" onchange="validarForm()">
<option value="">Selecione</option>
<option>50-180 mil</option>
<option>180-300 mil</option>
<option>300 mil+</option>
</select>
</div>

<div id="f_valor_aluguel" class="field-group">
<label>Aluguel</label>
<select id="valor_aluguel" onchange="validarForm()">
<option value="">Selecione</option>
<option>600-1000</option>
<option>1000-2000</option>
<option>2000+</option>
</select>
</div>

<div id="f_pagamento" class="field-group">
<label>Pagamento</label>
<select id="pagamento" onchange="handlePagamento(); validarForm()">
<option value="">Selecione</option>
<option>À vista</option>
<option>Financiado</option>
</select>
</div>

<div id="f_entrada" class="field-group">
<label>Entrada</label>
<input id="entrada" type="number" oninput="validarForm()">
</div>

<button id="btnEnviar" type="button" onclick="enviarZap()" disabled>
Ver imóveis no WhatsApp
</button>


</form>
</div>

<a href="https://wa.me/5522992414173" class="whatsapp-float">💬</a>

<script>
function atualizarFunil(){
let tipo=tipo_servico.value;

f_tipo_imovel.classList.add('show');

f_valor_compra.classList.remove('show');
f_valor_aluguel.classList.remove('show');
f_pagamento.classList.remove('show');
f_entrada.classList.remove('show');

if(tipo==="Comprar"){
f_valor_compra.classList.add('show');
f_pagamento.classList.add('show');
}

if(tipo==="Alugar Fixo"){
f_valor_aluguel.classList.add('show');
}
}

function handleImovel(){
let t=tipo_imovel.value;

f_quartos.classList.remove('show');
f_piscina.classList.remove('show');

if(t==="Casa"){
f_quartos.classList.add('show');
f_piscina.classList.add('show');
}
}

function handlePagamento(){
if(pagamento.value==="Financiado"){
f_entrada.classList.add('show');
}else{
f_entrada.classList.remove('show');
}
}

function validarForm(){
let ok = nome.value && tipo_servico.value && tipo_imovel.value;

if(tipo_imovel.value==="Casa" && !quartos.value) ok=false;

if(tipo_servico.value==="Comprar"){
if(!valor_compra.value || !pagamento.value) ok=false;
if(pagamento.value==="Financiado" && !entrada.value) ok=false;
}

if(tipo_servico.value==="Alugar Fixo"){
if(!valor_aluguel.value) ok=false;
}

btnEnviar.disabled=!ok;
}

function enviarZap(){
let msg=`Olá, quero ver imóveis%0A%0A
Nome:${nome.value}%0A
Tipo:${tipo_servico.value}%0A
Imóvel:${tipo_imovel.value}%0A
Quartos:${quartos.value||"N/A"}%0A
Piscina:${piscina.value||"N/A"}%0A
Valor:${valor_compra.value||valor_aluguel.value||"N/A"}%0A
Pagamento:${pagamento.value||"N/A"}%0A
Entrada:${entrada.value||"N/A"}`;

window.open(`https://wa.me/5522992414173?text=${msg}`);
}
</script>

</body>
</html>
