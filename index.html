<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda Casas RJ | Qualificação de Perfil</title>

    <meta property="og:type" content="website">
    <meta property="og:title" content="Venda Casas RJ | Qualificação de Perfil">
    <meta property="og:description" content="Encontre seu imóvel ideal em Unamar e Região dos Lagos.">
    <meta property="og:image" content="https://i.ibb.co/VpC3nQxQ/logo-edited.jpg">
    <meta property="og:image:width" content="400">
    <meta property="og:image:height" content="400">

    <style>
        body { 
            background-color: #f4f4f4; 
            color: #333; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 20px;
        }
        .container { 
            background: #ffffff; 
            border-top: 6px solid #8A2BE2; /* Topo Lilás */
            padding: 30px; 
            border-radius: 15px; 
            width: 100%; 
            max-width: 400px; 
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .logo-container {
            margin-bottom: 20px;
            display: block;
        }
        .logo { 
            max-width: 180px; 
            height: auto; 
            border-radius: 8px;
        }
        
        .title-text { color: #FF8C00; font-weight: bold; font-size: 22px; margin-bottom: 5px; display: block; }
        .sub-text { color: #8A2BE2; font-size: 14px; margin-bottom: 25px; display: block; font-weight: 600; }
        
        /* AQUI ESTAVA O ERRO: Faltava fechar o style e as classes de exibição */
        .field-group { text-align: left; margin-bottom: 18px; display: none; } 
        .show { display: block !important; } 

        label { color: #FF8C00; font-size: 11px; text-transform: uppercase; font-weight: bold; margin-bottom: 8px; display: block; }
        
        select { 
            width: 100%; 
            padding: 12px; 
            background: #fff; 
            border: 1px solid #ccc; 
            color: #000; 
            border-radius: 8px; 
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
        }

        select:focus { border-color: #8A2BE2; }

        button { 
            width: 100%; 
            padding: 16px; 
            background: #8A2BE2; 
            color: #fff; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            text-transform: uppercase; 
            cursor: pointer; 
            margin-top: 15px;
            font-size: 15px;
            transition: 0.3s;
        }

        button:hover { background: #FF8C00; }
        .footer-text { font-size: 10px; color: #999; margin-top: 25px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <img src="https://i.ibb.co/VpC3nQxQ/logo-edited.jpg" alt="Venda Casas RJ" class="logo">
        </div>
        
        <span class="title-text">Qualificação de Perfil</span>
        <span class="sub-text">Encontre seu imóvel em Unamar e Região</span>

        <form id="leadForm">
            <div class="field-group show">
                <label>O que você busca hoje?</label>
                <select id="tipo_servico" onchange="atualizarFunil()">
                    <option value="" disabled selected>Escolha uma opção...</option>
                    <option value="comprar">Comprar um Imóvel</option>
                    <option value="alugar_fixo">Aluguel Fixo</option>
                    <option value="temporada">Aluguel de Temporada</option>
                </select>
            </div>

            <div id="f_quartos" class="field-group">
                <label>Quantidade de Quartos</label>
                <select id="quartos">
                    <option>1 Quarto</option>
                    <option selected>2 Quartos</option>
                    <option>3 Quartos ou mais</option>
                </select>
            </div>

            <div id="f_venda" class="field-group">
                <label>Investimento Pretendido</label>
                <select id="valor_venda">
                    <option>Até R$ 150 mil</option>
                    <option>R$ 150 mil a R$ 250 mil</option>
                    <option>Acima de R$ 250 mil</option>
                </select>
            </div>

            <button type="button" onclick="enviarZap()">Enviar Preferências</button>
        </form>

        <div class="footer-text">Venda Casas RJ - Atendimento Exclusivo</div>
    </div>

    <script>
        function atualizarFunil() {
            const selecao = document.getElementById('tipo_servico').value;
            
            // Esconde os campos primeiro
            document.getElementById('f_quartos').classList.remove('show');
            document.getElementById('f_venda').classList.remove('show');

            // Mostra se houver seleção
            if (selecao !== "") {
                document.getElementById('f_quartos').classList.add('show');
                if(selecao === 'comprar') {
                    document.getElementById('f_venda').classList.add('show');
                }
            }
        }

        function enviarZap() {
            const tipo = document.getElementById('tipo_servico').value;
            if (!tipo) { alert("Selecione uma opção antes de enviar."); return; }
            
            const q = document.getElementById('quartos').value;
            const preco = (tipo === 'comprar') ? `\n*Investimento:* ${document.getElementById('valor_venda').value}` : "";
            
            const msg = `Olá! Vi o funil da Venda Casas RJ:\n\n*Busca:* ${tipo}\n*Quartos:* ${q}${preco}`;
            const numero = "5522999595115";
            
            window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
