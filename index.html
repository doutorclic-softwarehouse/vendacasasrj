<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venda Casas RJ</title>

<style>
:root {
    --laranja-glow: #ff6a00;
    --roxo: #6a2cff;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #f5f6fb, #ffffff);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

/* CONTAINER PRINCIPAL */
.container {
    position: relative;
    background: #fff;
    padding: 30px 25px;
    border-radius: 20px;
    width: 100%;
    max-width: 400px;
    text-align: center;
    z-index: 1;
    box-sizing: border-box; /* Impede que os campos vazem */
}

/* BORDA NEON LARANJA */
.container::before {
    content: "";
    position: absolute;
    inset: -1px;
    border-radius: 22px;
    background: linear-gradient(45deg, #ff6a00, #ff8c3a, #ff6a00);
    z-index: -1;
}

/* GLOW LARANJA */
.container::after {
    content: "";
    position: absolute;
    inset: -6px;
    border-radius: 24px;
    background: linear-gradient(45deg, #ff6a00, #ff8c3a, #ff6a00);
    filter: blur(12px);
    z-index: -2;
    opacity: 0.7;
}

/* LOGO */
.logo {
    max-width: 160px;
    margin: 0 auto 15px;
    display: block;
    mix-blend-mode: multiply;
}

/* TEXTOS */
.title {
    font-size: 22px;
    font-weight: 800;
    color: var(--roxo);
}

.sub {
    font-size: 13px;
    color: #666;
    margin-bottom: 10px;
}

.urgencia {
    font-size: 12px;
    color: var(--laranja-glow);
    font-weight: bold;
    margin-bottom: 20px;
}

/* CAMPOS (COM CORREÇÃO DE TAMANHO) */
.field-group {
    text-align: left;
    margin-bottom: 15px;
    display: none;
    opacity: 0;
    transform: translateY(10px);
}

.field-group.show {
    display: block;
    animation: fadeIn 0.4s forwards;
}

@keyframes fadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

label {
    font-size: 11px;
    font-weight: bold;
    color: #555;
    display: block;
    margin-bottom: 5px;
}

select, input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #ddd;
    box-sizing: border-box; /* ESSENCIAL PARA NÃO SAIR DA BORDA */
    font-size: 14px;
}

/* BOTÃO CTA PULSANTE ORIGINAL */
button {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(45deg, var(--laranja-glow), var(--roxo));
    color: white;
    font-weight: 800;
    cursor: pointer;
    margin-top: 15px;
    position: relative;
    z-index: 1;
}

button::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50px;
    background: linear-gradient(45deg, var(--laranja-glow), var(--roxo));
    z-index: -1;
    animation: pulseBtn 1.8s infinite;
}

@keyframes pulseBtn {
    0% { transform: scale(1); opacity: 0.7; }
    70% { transform: scale(1.08); opacity: 0; }
    100% { opacity: 0; }
}

button:disabled {
    opacity: 0.5;
    animation: none;
    cursor: not-allowed;
}

/* WHATSAPP FLOAT */
.whatsapp-float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(45deg, #25d366, #128c7e);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    text-decoration: none;
    z-index: 999;
}

.whatsapp-float::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: rgba(37,211,102,0.5);
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); opacity: 0.7; }
    70% { transform: scale(1.6); opacity: 0; }
    100% { opacity: 0; }
}

.footer-text {
    font-size: 10px;
    color: #999;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

<img src="https://i.ibb.co/HDWMYfkJ/venda-logo.jpg" class="logo">

<div class="title">Encontre seu imóvel ideal</div>
<div class="sub">Filtramos as melhores opções pra você</div>
<div class="urgencia">🔥 Temos imóveis com desconto HOJE</div>

<form>

<div class="field-group show" style="display:block;">
<label>Seu nome</label>
<input type="text" id="nome">
</div>

<div class="field-group show" style="display:block;">
<label>Seu telefone</label>
<input type="tel" id="telefone">
</div>

<div class="field-group show" style="display:block;">
<label>O que você busca?</label>
<select id="tipo_servico" onchange="atualizarFunil()">
<option value="">Escolha...</option>
<option value="comprar">Comprar</option>
<option value="alugar_fixo">Alugar</option>
<option value="temporada">Temporada</option>
</select>
</div>

<div id="f_urgencia" class="field-group">
<label>Quando pretende fechar?</label>
<select id="urgencia">
<option value="">Selecione</option>
<option>Imediato</option>
<option>Até 30 dias</option>
<option>Até 3 meses</option>
<option>Só pesquisando</option>
</select>
</div>

<div id="f_quartos" class="field-group">
<label>Quartos</label>
<select id="quartos">
<option value="">Selecione</option>
<option>1</option>
<option>2</option>
<option>3+</option>
</select>
</div>

<div id="f_piscina" class="field-group">
<label>Piscina?</label>
<select id="piscina">
<option value="">Selecione</option>
<option>Sim</option>
<option>Não</option>
</select>
</div>

<div id="f_credito" class="field-group">
<label>Crédito aprovado?</label>
<select id="credito">
<option value="">Selecione</option>
<option>Sim</option>
<option>Em análise</option>
<option>Não</option>
</select>
</div>

<button id="btnEnviar" type="button" onclick="enviarZap()" disabled>
Ver imóveis disponíveis
</button>

</form>

<div class="footer-text">Venda Casas RJ</div>

</div>

<a href="https://wa.me/5522992414173?text=Olá!%20Vim%20pelo%20site" 
   class="whatsapp-float" 
   target="_blank">
   💬
</a>

<script>
function atualizarFunil() {
    const tipo = document.getElementById('tipo_servico').value;

    document.getElementById('btnEnviar').disabled = false;

    // Adiciona a classe show nos campos (Igual ao seu original)
    document.getElementById('f_urgencia').classList.add('show');
    document.getElementById('f_quartos').classList.add('show');
    document.getElementById('f_piscina').classList.add('show');

    // Lógica específica para o campo crédito
    if (tipo === "comprar") {
        document.getElementById('f_credito').classList.add('show');
    } else {
        document.getElementById('f_credito').classList.remove('show');
    }
}

function enviarZap() {
    const nome = document.getElementById('nome').value;
    const tel = document.getElementById('telefone').value;
    const urgencia = document.getElementById('urgencia').value;
    const tipo = document.getElementById('tipo_servico').value;
    const quartos = document.getElementById('quartos').value;
    const piscina = document.getElementById('piscina').value;

    // Validação original
    if (!nome || !tel || !urgencia || !tipo || !quartos || !piscina) {
        alert("Preencha tudo corretamente");
        return;
    }

    if (urgencia === "Só pesquisando") {
        alert("Estamos atendendo clientes prontos pra fechar 😉");
        return;
    }

    const msg = `📊 LEAD QUALIFICADO

Nome: ${nome}
Telefone: ${tel}
Prazo: ${urgencia}

Tipo: ${tipo}
Quartos: ${quartos}
Piscina: ${piscina}`;

    window.open(`https://wa.me/5522992414173?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
