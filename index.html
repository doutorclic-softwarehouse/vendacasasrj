<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venda Casas RJ</title>

<style>
:root {
    --laranja: #ff6a00;
    --roxo: #6a2cff;
    --bg: #f5f6fb;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #f5f6fb, #ffffff);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* CARD */
.container {
    background: #fff;
    padding: 30px 25px;
    border-radius: 20px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.08);
    text-align: center;
}

/* LOGO */
.logo {
    max-width: 160px;
    margin-bottom: 10px;
}

/* TEXTOS */
.title {
    font-size: 22px;
    font-weight: 800;
    color: var(--roxo);
}

.sub {
    font-size: 13px;
    color: #666;
    margin-bottom: 10px;
}

.urgencia {
    font-size: 12px;
    color: var(--laranja);
    font-weight: bold;
    margin-bottom: 20px;
}

/* CAMPOS */
.field-group {
    text-align: left;
    margin-bottom: 15px;
    display: none;
    opacity: 0;
    transform: translateY(10px);
}

.field-group.show {
    display: block;
    animation: fadeIn 0.4s forwards;
}

@keyframes fadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

label {
    font-size: 11px;
    font-weight: bold;
    color: #555;
}

select {
    width: 100%;
    padding: 14px;
    margin-top: 5px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

/* BOTÃO */
button {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(45deg, var(--laranja), var(--roxo));
    color: white;
    font-weight: 800;
    cursor: pointer;
    margin-top: 15px;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.03);
}

button:active {
    transform: scale(0.97);
}

.footer-text {
    font-size: 10px;
    color: #999;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

    <img src="SUA_LOGO_AQUI.png" class="logo">

    <div class="title">Encontre seu imóvel ideal</div>
    <div class="sub">Filtramos as melhores opções pra você</div>
    <div class="urgencia">🔥 Atendimento rápido hoje</div>

    <form id="leadForm">

        <div class="field-group show">
            <label>O que você busca hoje?</label>
            <select id="tipo_servico" onchange="atualizarFunil()">
                <option value="" disabled selected>Escolha uma opção...</option>
                <option value="comprar">Comprar um Imóvel</option>
                <option value="alugar_fixo">Aluguel Fixo (Mensal)</option>
                <option value="temporada">Aluguel de Temporada</option>
            </select>
        </div>

        <div id="f_quartos" class="field-group">
            <label>Quantidade de Quartos</label>
            <select id="quartos">
                <option>1 Quarto</option>
                <option selected>2 Quartos</option>
                <option>3 Quartos ou mais</option>
            </select>
        </div>

        <div id="f_piscina" class="field-group">
            <label>Deseja Piscina?</label>
            <select id="piscina">
                <option>Com Piscina (Indispensável)</option>
                <option>Sem Piscina / Tanto faz</option>
            </select>
        </div>

        <div id="f_venda" class="field-group">
            <label>Faixa de Investimento</label>
            <select id="valor_venda">
                <option>Até R$ 150 mil</option>
                <option>R$ 150 mil a R$ 250 mil</option>
                <option>R$ 250 mil a R$ 450 mil</option>
                <option>Acima de R$ 450 mil</option>
            </select>
        </div>

        <div id="f_pagamento" class="field-group">
            <label>Como pretende pagar?</label>
            <select id="forma_pagamento">
                <option>Entrada + Parcelas Diretas</option>
                <option>Pagamento À Vista</option>
                <option>Financiamento Bancário</option>
                <option>Permuta (Carro/Imóvel)</option>
            </select>
        </div>

        <div id="f_aluguel" class="field-group">
            <label>Preço do Aluguel Mensal</label>
            <select id="valor_aluguel">
                <option>R$ 600 a R$ 1.000</option>
                <option>R$ 1.000 a R$ 2.000</option>
                <option>Acima de R$ 2.000</option>
            </select>
        </div>

        <div id="f_temporada" class="field-group">
            <label>Média de Diária</label>
            <select id="valor_temporada">
                <option>Até R$ 300 / dia</option>
                <option>R$ 300 a R$ 600 / dia</option>
                <option>Acima de R$ 600 / dia</option>
            </select>
        </div>

        <button type="button" onclick="enviarZap()">
            Ver imóveis disponíveis
        </button>

    </form>

    <div class="footer-text">Venda Casas RJ</div>

</div>

<script>
function atualizarFunil() {
    const selecao = document.getElementById('tipo_servico').value;

    const campos = document.querySelectorAll('.field-group');
    campos.forEach(campo => {
        if (campo.id !== "") campo.classList.remove('show');
    });

    if (selecao !== "") {
        document.getElementById('f_quartos').classList.add('show');
        document.getElementById('f_piscina').classList.add('show');
    }

    if (selecao === "comprar") {
        document.getElementById('f_venda').classList.add('show');
        document.getElementById('f_pagamento').classList.add('show');
    } else if (selecao === "alugar_fixo") {
        document.getElementById('f_aluguel').classList.add('show');
    } else if (selecao === "temporada") {
        document.getElementById('f_temporada').classList.add('show');
    }
}

function enviarZap() {
    const tipo = document.getElementById('tipo_servico').value;

    if (!tipo) {
        alert("Selecione o que você busca");
        return;
    }

    const quartos = document.getElementById('quartos').value;
    const piscina = document.getElementById('piscina').value;
    let detalhes = "";
    const numero = "5522999595115";

    if (tipo === "comprar") {
        detalhes = `Compra\nValor: ${document.getElementById('valor_venda').value}\nPagamento: ${document.getElementById('forma_pagamento').value}`;
    } else if (tipo === "alugar_fixo") {
        detalhes = `Aluguel Fixo\nValor: ${document.getElementById('valor_aluguel').value}`;
    } else {
        detalhes = `Temporada\nDiária: ${document.getElementById('valor_temporada').value}`;
    }

    const msg = `Olá! Quero atendimento:\n\n${detalhes}\nQuartos: ${quartos}\nPiscina: ${piscina}`;

    window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`, '_blank');
}
</script>

</body>
</html>
